name = "ai-lead-generator-dashboard"
compatibility_date = "2025-09-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

# Pages Advanced Mode: every request goes through dist/_worker.js (bundled
# from src/index.ts by `npm run build`). Pages dashboard auto-discovers this.
#
# Environment variables — set these in the Pages dashboard under
#   Settings → Environment variables (NOT here, NOT in git):
#     SUPABASE_URL
#     SUPABASE_SERVICE_ROLE_KEY  (mark as "Encrypted")
#     FLY_TRIGGER_URL
#     FLY_TRIGGER_TOKEN          (mark as "Encrypted")
#
# No wrangler CLI required for deploy if you connect GitHub from the dashboard.
