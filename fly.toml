# Fly.io configuration for AI Lead Generator
app = "ai-lead-generator"
primary_region = "iad"

[build]
  builder = "dockerfile"
  dockerfile = "./Dockerfile"

[env]
  LOG_LEVEL = "INFO"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

[[services]]
  protocol = "tcp"
  internal_port = 8000
  
  [services.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[deploy]
  release_command = "python -m alembic upgrade head"
  strategy = "rolling"
